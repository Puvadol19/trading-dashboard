<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100vh;
      background: #0a0f1e;
      font-family: monospace;
      overflow: hidden;
    }

    /* Top bar */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      gap: 6px;
      height: 38px;
    }

    #topbar .title {
      font-size: 11px;
      font-weight: 700;
      color: #22c55e;
      white-space: nowrap;
    }

    #topbar .status {
      font-size: 9px;
      color: #64748b;
    }

    #topbar .controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    button {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 10px;
      font-family: monospace;
      padding: 3px 7px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover {
      background: #334155;
      color: #e2e8f0;
    }

    button.active {
      background: #22c55e20;
      border-color: #22c55e60;
      color: #22c55e;
    }

    /* iframe wrapper */
    #frame-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - 38px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      background: #0a0f1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }

    #loading .dot-loader {
      display: flex;
      gap: 6px;
    }

    #loading .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: bounce 1.2s ease-in-out infinite;
    }

    #loading .dot:nth-child(2) { animation-delay: 0.2s; }
    #loading .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    #loading .label {
      font-size: 11px;
      color: #64748b;
      font-family: monospace;
    }

    /* Width selector */
    select {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 10px;
      font-family: monospace;
      padding: 3px 4px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <span class="title">Trading Dashboard</span>
    <div class="controls">
      <select id="width-select" title="Panel width">
        <option value="400">400px</option>
        <option value="500" selected>500px</option>
        <option value="600">600px</option>
        <option value="800">800px</option>
      </select>
      <button id="btn-reload" title="Reload dashboard">Reload</button>
      <button id="btn-popout" title="Open in new tab">Open Tab</button>
    </div>
  </div>

  <div id="frame-wrapper">
    <div id="loading">
      <div class="dot-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <span class="label">Loading Trading Dashboard...</span>
    </div>
    <iframe
      id="dashboard-frame"
      src="https://trading-dashboard-dpzh.vercel.app/"
      allow="notifications; microphone; camera"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
    ></iframe>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
